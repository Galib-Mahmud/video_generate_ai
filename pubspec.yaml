name: hussein
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ─── State Management ─────────────────────────────────────────────
  get: ^4.6.6

  # ─── UI / Responsive ──────────────────────────────────────────────
  flutter_screenutil: ^5.9.3

  # ─── Networking ───────────────────────────────────────────────────
  http: ^1.2.2

  # ─── Local Storage ────────────────────────────────────────────────
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash/
    - assets/images/auth/
    - assets/images/drawer/
    - assets/images/home/